<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Sims Home Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }
        header {
            background-color: #e63946;
            color: white;
            padding: 10px 0;
            text-align: center;
        }
        nav {
            background-color: #f1faee;
            padding: 10px;
        }
        nav a {
            margin: 15px;
            text-decoration: none;
            color: #457b9d;
        }
        .tabs {
            background-color: #a8dadc;
            display: flex;
            justify-content: center;
            padding: 10px;
        }
        .tab {
            margin: 0 10px;
            padding: 10px;
            background-color: #f1faee;
            border-radius: 5px;
        }
        .tab:hover {
            cursor: pointer;
            background-color: #457b9d;
            color: white;
        }
        .tags {
            padding: 10px;
            text-align: center;
        }
        .tag {
            margin: 5px;
            display: inline-block;
            padding: 5px 10px;
            background-color: #f1faee;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<header>
    <h1>Welcome to My Sims World</h1>
</header>

<nav>
    <a href="#sims3">The Sims 3</a>
    <a href="#sims4">The Sims 4</a>
    <a href="#gallery">Gallery</a>
    <a href="#blog">Blog</a>
    <a href="#contact">Contact</a>
</nav>

<div class="tabs">
    <div class="tab">Home</div>
    <div class="tab">About</div>
    <div class="tab">Tips & Tricks</div>
    <div class="tab">Downloads</div>
</div>

<div class="tags">
    <span class="tag">Gameplay</span>
    <span class="tag">Mods</span>
    <span class="tag">Builds</span>
    <span class="tag">Community</span>
</div>

</body>

</html>
